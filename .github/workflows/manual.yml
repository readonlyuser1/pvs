name: Manual workflow

on:
  push:
  workflow_dispatch:

jobs:
  pvs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install curl jq wget -y
          
      - name: Check and create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "=== Getting latest PVS version from Maven (sorted by timestamp) ==="
          
          # Получаем последнюю версию по timestamp
          MAVEN_RESPONSE=$(curl -s "https://search.maven.org/solrsearch/select?q=g:com.pvsstudio%20AND%20a:pvsstudio-maven-plugin&core=gav&rows=1&wt=json&sort=timestamp%20desc")
          echo "Maven response: $MAVEN_RESPONSE"
          
          PVS_CORE_VER_LATEST=$(echo "$MAVEN_RESPONSE" | jq -r '.response.docs[0].v')
          echo "PVS_CORE_VER_LATEST = $PVS_CORE_VER_LATEST"
          
          if [ -z "$PVS_CORE_VER_LATEST" ] || [ "$PVS_CORE_VER_LATEST" = "null" ]; then
            echo "ERROR: Could not get version from Maven"
            exit 1
          fi
          
          echo "=== Getting current release from GitHub ==="
          GITHUB_RESPONSE=$(curl -s https://api.github.com/repos/readonlyuser1/pvs/releases/latest)
          PVS_CORE_VER_NOW=$(echo "$GITHUB_RESPONSE" | jq -r '.tag_name')
          echo "PVS_CORE_VER_NOW = $PVS_CORE_VER_NOW"
          
          if [ -z "$PVS_CORE_VER_NOW" ] || [ "$PVS_CORE_VER_NOW" = "null" ]; then
            echo "No releases found yet, will create first release"
            PVS_CORE_VER_NOW="none"
          fi
          
          echo "=== Comparing versions ==="
          echo "Latest Maven: $PVS_CORE_VER_LATEST"
          echo "Current GitHub: $PVS_CORE_VER_NOW"
          
          if [ "$PVS_CORE_VER_NOW" != "$PVS_CORE_VER_LATEST" ]; then
            echo "=== Downloading file for version $PVS_CORE_VER_LATEST ==="
            
            FILE_URL="https://files.pvs-studio.com/java/pvsstudio-cores/$PVS_CORE_VER_LATEST.zip"
            echo "Downloading from: $FILE_URL"
            
            # Пробуем скачать файл
            if wget --timeout=30 --tries=3 "$FILE_URL"; then
              echo "Download successful"
              ls -lh "$PVS_CORE_VER_LATEST.zip"
            else
              echo "WARNING: File not found at $FILE_URL"
              echo "Will try to create release without file (or check if file exists)"
              exit 1
            fi
            
            echo "=== Creating release ==="
            RESPONSE=$(curl -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/readonlyuser1/pvs/releases \
              -d '{
                "tag_name": "'"$PVS_CORE_VER_LATEST"'",
                "name": "Release '"$PVS_CORE_VER_LATEST"'",
                "body": "Automatic release from Maven Central\n\nVersion: '"$PVS_CORE_VER_LATEST"'\nDate: '"$(date)"'",
                "draft": false,
                "prerelease": false
              }')
            
            echo "Release creation response: $RESPONSE"
            RELEASE_ID=$(echo "$RESPONSE" | jq -r '.id')
            echo "RELEASE_ID = $RELEASE_ID"
            
            if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
              echo "=== Uploading asset ==="
              UPLOAD_RESPONSE=$(curl -L \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -H "Content-Type: application/zip" \
                "https://uploads.github.com/repos/readonlyuser1/pvs/releases/$RELEASE_ID/assets?name=$PVS_CORE_VER_LATEST.zip" \
                --data-binary @"$PVS_CORE_VER_LATEST.zip")
              
              echo "Upload response: $UPLOAD_RESPONSE"
              echo "✅ New release created successfully!"
              echo "Release URL: https://github.com/readonlyuser1/pvs/releases/tag/$PVS_CORE_VER_LATEST"
            else
              echo "ERROR: Failed to create release"
              echo "Response: $RESPONSE"
              exit 1
            fi
          else
            echo "ℹ️ No new version available. Latest version is already $PVS_CORE_VER_NOW"
          fi