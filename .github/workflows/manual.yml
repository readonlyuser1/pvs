name: Manual workflow

on:
  push:
  workflow_dispatch:

permissions:
  contents: write

env:
  REPO: readonlyuser1/pvs
  MAVEN_URL: https://repo1.maven.org/maven2/com/pvsstudio/pvsstudio-maven-plugin/maven-metadata.xml
  DOWNLOAD_BASE: https://files.pvs-studio.com/java/pvsstudio-cores

jobs:
  pvs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install curl jq wget xmlstarlet bc -y
          
      - name: Get latest version & create release
        id: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # ... (весь код из предыдущей версии) ...
          
          # Сохраняем результат для уведомления
          echo "release_version=$LATEST" >> $GITHUB_OUTPUT
          echo "release_url=https://github.com/$REPO/releases/tag/$LATEST" >> $GITHUB_OUTPUT
          echo "release_id=$RELEASE_ID" >> $GITHUB_OUTPUT
          echo "asset_size=$(numfmt --to=iec $FILE_SIZE 2>/dev/null || echo $FILE_SIZE bytes)" >> $GITHUB_OUTPUT
          
      - name: Send Telegram Notification
        if: always() && (success() || failure())
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # ============================================
          # SECURE TELEGRAM NOTIFICATION
          # ============================================
          
          # Проверка наличия секретов
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            echo "⚠️ Telegram credentials not configured, skipping notification"
            exit 0
          fi
          
          # Безопасная проверка токена (не выводим в логи)
          echo "📨 Sending Telegram notification..."
          
          # Определяем статус
          if [ "${{ job.status }}" = "success" ]; then
            STATUS="✅ SUCCESS"
            EMOJI="🎉"
            COLOR="good"
          else
            STATUS="❌ FAILED"
            EMOJI="💥"
            COLOR="danger"
          fi
          
          # Формируем сообщение
          MESSAGE=$(cat <<EOF
          ${EMOJI} *PVS Studio Release ${STATUS}*
          
          *Repository:* ${REPO}
          *Version:* ${{ steps.release.outputs.release_version || 'N/A' }}
          *Status:* ${STATUS}
          *Time:* $(date -u +'%Y-%m-%d %H:%M:%S UTC')
          *Workflow:* https://github.com/${REPO}/actions/runs/${{ github.run_id }}
          
          $([ "${{ job.status }}" = "success" ] && echo "*Release:* ${{ steps.release.outputs.release_url || 'N/A' }}")
          $([ "${{ job.status }}" = "success" ] && echo "*Size:* ${{ steps.release.outputs.asset_size || 'N/A' }}")
          
          $([ "${{ job.status }}" != "success" ] && echo "⚠️ *Check logs for details:* https://github.com/${REPO}/actions/runs/${{ github.run_id }}")
          EOF
          )
          
          # Экранирование для JSON
          MESSAGE_JSON=$(echo "$MESSAGE" | jq -sR .)
          
          # Отправка с обработкой ошибок
          RESPONSE=$(curl -s -f -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": ${MESSAGE_JSON},
              \"parse_mode\": \"Markdown\",
              \"disable_web_page_preview\": true,
              \"disable_notification\": false
            }" 2>&1) || {
              echo "⚠️ Failed to send Telegram notification"
              exit 0
            }
          
          # Проверка ответа
          if echo "$RESPONSE" | jq -e '.ok' > /dev/null 2>&1; then
            if [ "$(echo "$RESPONSE" | jq -r '.ok')" = "true" ]; then
              echo "✅ Telegram notification sent successfully"
            else
              ERROR_MSG=$(echo "$RESPONSE" | jq -r '.description // "Unknown error"')
              echo "⚠️ Telegram API error: $ERROR_MSG"
            fi
          else
            echo "⚠️ Failed to parse Telegram response"
          fi

      - name: Send Error Notification (detailed)
        if: failure()
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          # Отправка детальной ошибки
          if [ -z "$TELEGRAM_BOT_TOKEN" ] || [ -z "$TELEGRAM_CHAT_ID" ]; then
            exit 0
          fi
          
          ERROR_MESSAGE=$(cat <<EOF
          🚨 *PVS Studio Release CRITICAL ERROR*
          
          *Repository:* ${REPO}
          *Workflow:* https://github.com/${REPO}/actions/runs/${{ github.run_id }}
          *Job:* ${{ github.job }}
          *Error:* Check workflow logs for details
          
          ⚠️ *Action required!* Please investigate the failure.
          EOF
          )
          
          ERROR_JSON=$(echo "$ERROR_MESSAGE" | jq -sR .)
          
          curl -s -X POST \
            "https://api.telegram.org/bot${TELEGRAM_BOT_TOKEN}/sendMessage" \
            -H "Content-Type: application/json" \
            -d "{
              \"chat_id\": \"${TELEGRAM_CHAT_ID}\",
              \"text\": ${ERROR_JSON},
              \"parse_mode\": \"Markdown\"
            }" > /dev/null 2>&1 || true

      - name: Summary
        if: success()
        run: |
          echo "## ✅ Release Created Successfully" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Version:** ${{ steps.release.outputs.release_version }}" >> $GITHUB_STEP_SUMMARY
          echo "**Release:** ${{ steps.release.outputs.release_url }}" >> $GITHUB_STEP_SUMMARY
          echo "**Size:** ${{ steps.release.outputs.asset_size }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📨 Telegram notification: ${{ secrets.TELEGRAM_CHAT_ID && '✅ Sent' || '⚠️ Not configured' }}" >> $GITHUB_STEP_SUMMARY