name: Manual workflow

on:
  push:
  workflow_dispatch:

jobs:
  pvs:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        
      - name: Install dependencies
        run: |
          sudo apt update
          sudo apt install curl jq wget -y
          
      - name: Check and create release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Getting latest PVS version from Maven..."
          PVS_CORE_VER_LATEST=$(curl -s "https://search.maven.org/solrsearch/select?q=g:com.pvsstudio%20AND%20a:pvsstudio-maven-plugin&core=gav&rows=1&wt=json" | jq -r '.response.docs[0].v')
          echo "PVS_CORE_VER_LATEST = $PVS_CORE_VER_LATEST"
          
          echo "Getting current release version from GitHub..."
          PVS_CORE_VER_NOW=$(curl -s https://api.github.com/repos/readonlyuser1/pvs/releases/latest | jq -r '.tag_name')
          echo "PVS_CORE_VER_NOW = $PVS_CORE_VER_NOW"
          
          if [ "$PVS_CORE_VER_NOW" != "$PVS_CORE_VER_LATEST" ]; then
            echo "Found new version: $PVS_CORE_VER_LATEST"
            
            FILE_URL="https://files.pvs-studio.com/java/pvsstudio-cores/$PVS_CORE_VER_LATEST.zip"
            echo "Downloading from: $FILE_URL"
            
            if wget "$FILE_URL"; then
              echo "Download successful"
            else
              echo "Failed to download file"
              exit 1
            fi
            
            echo "Creating release..."
            RESPONSE=$(curl -L \
              -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GITHUB_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/readonlyuser1/pvs/releases \
              -d '{
                "tag_name": "'"$PVS_CORE_VER_LATEST"'",
                "name": "Release '"$PVS_CORE_VER_LATEST"'",
                "body": "Automatic release from Maven Central",
                "draft": false,
                "prerelease": false
              }')
            
            echo "Response: $RESPONSE"
            RELEASE_ID=$(echo $RESPONSE | jq -r '.id')
            echo "RELEASE_ID = $RELEASE_ID"
            
            if [ "$RELEASE_ID" != "null" ] && [ -n "$RELEASE_ID" ]; then
              echo "Uploading asset..."
              curl -L \
                -X POST \
                -H "Accept: application/vnd.github+json" \
                -H "Authorization: Bearer $GITHUB_TOKEN" \
                -H "X-GitHub-Api-Version: 2022-11-28" \
                -H "Content-Type: application/zip" \
                https://uploads.github.com/repos/readonlyuser1/pvs/releases/$RELEASE_ID/assets?name=$PVS_CORE_VER_LATEST.zip \
                --data-binary @"$PVS_CORE_VER_LATEST.zip"
              
              echo "New release created successfully!"
            else
              echo "Failed to create release"
              exit 1
            fi
          else
            echo "No new version available. Latest version is already $PVS_CORE_VER_NOW"
          fi