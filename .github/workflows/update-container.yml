name: Update Container

on:
  schedule:
    # Ежемесячно: 1-го числа каждого месяца в 00:00
    - cron: '0 0 1 * *'
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.AAA }}
      
      - name: Get current date
        id: date
        run: |
          echo "date=$(date -u +'%Y%m%d')" >> $GITHUB_OUTPUT
          echo "timestamp=$(date -u +'%Y-%m-%d %H:%M:%S UTC')" >> $GITHUB_OUTPUT
      
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/pvs-updater:latest
            ghcr.io/${{ github.repository_owner }}/pvs-updater:${{ steps.date.outputs.date }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.title=PVS Studio Updater
            org.opencontainers.image.description=Automated PVS Studio release updater
            org.opencontainers.image.version=${{ steps.date.outputs.date }}
            org.opencontainers.image.created=${{ steps.date.outputs.timestamp }}
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
      
      - name: Image digest
        run: |
          echo "## ✅ Container Updated" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** ${{ steps.date.outputs.timestamp }}" >> $GITHUB_STEP_SUMMARY
          echo "**Image:** ghcr.io/${{ github.repository_owner }}/pvs-updater:latest" >> $GITHUB_STEP_SUMMARY
          echo "**Tag:** ghcr.io/${{ github.repository_owner }}/pvs-updater:${{ steps.date.outputs.date }}" >> $GITHUB_STEP_SUMMARY